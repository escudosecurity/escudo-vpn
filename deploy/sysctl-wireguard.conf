# Escudo VPN — WireGuard kernel tuning
# Install: sudo cp deploy/sysctl-wireguard.conf /etc/sysctl.d/ && sudo sysctl --system

# UDP buffer sizes (26MB for high-throughput WireGuard)
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# Network backlog
net.core.netdev_max_backlog = 10000

# Connection tracking
net.netfilter.nf_conntrack_max = 131072

# IPv4 forwarding (required for VPN)
net.ipv4.ip_forward = 1

# IPv6 forwarding for tunnel
net.ipv6.conf.all.forwarding = 1

# Disable IPv6 on non-tunnel interfaces to prevent leaks
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.eth0.disable_ipv6 = 1

# TCP optimizations for VPN overlay
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
