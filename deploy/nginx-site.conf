# Escudo VPN — nginx config
# Install: sudo cp deploy/nginx-site.conf /etc/nginx/sites-available/escudovpn
#          sudo ln -sf /etc/nginx/sites-available/escudovpn /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

# Landing page
server {
    listen 80;
    server_name escudovpn.com www.escudovpn.com;

    root /var/www/escudovpn;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # SEO pages — clean URLs (no .html extension)
    location /seguranca-digital/ {
        try_files $uri $uri/ $uri.html =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve APK download
    location /escudo-vpn.apk {
        add_header Content-Disposition "attachment; filename=escudo-vpn.apk";
    }
}

# API reverse proxy
server {
    listen 80;
    server_name api.escudovpn.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
